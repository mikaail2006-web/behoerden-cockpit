name: CI - Behoerden Cockpit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax und Portal-Check
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: App-Syntax pruefen (Pflicht)
        run: node --check app/app.js

      - name: App-Inhalte pruefen (Pflicht)
        run: node scripts/check-app-content.mjs

      - name: Portal-Zugriff pruefen (Pflicht)
        run: node api/portal-access.test.mjs

      - name: Portal-Kontext pruefen (Pflicht)
        run: node api/portal-context.test.mjs

      - name: Portal-Contract pruefen (Pflicht)
        run: node api/portal-contract.test.mjs

      - name: Portal-Env pruefen (Pflicht)
        run: node api/portal-env.test.mjs

      - name: n8n Workflows pruefen (Pflicht)
        run: node scripts/check-n8n-workflows.mjs

      - name: Secret-Scan (Pflicht)
        run: node scripts/check-secrets.mjs

      - name: Package-Scripts pruefen (Pflicht)
        run: node scripts/check-package-scripts.mjs

      - name: Docs pruefen (Pflicht)
        run: node scripts/check-docs.mjs

      - name: Manifest-Check (optional - prueft lokale Dateien)
        run: node scripts/check-manifest.mjs
        continue-on-error: true

      - name: Datei-Referenzen pruefen (optional)
        run: node scripts/check-file-references.mjs
        continue-on-error: true

      - name: Supabase-Setup pruefen (optional - prueft lokale Env)
        run: node scripts/check-supabase-setup.mjs
        continue-on-error: true
